<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radiology • Learn Do Teach</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background-color: #0f0f0f;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    img {
      max-width: 90%;
      height: auto;
      border-radius: 1rem;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    p {
      max-width: 640px;
      text-align: center;
      line-height: 1.5;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    a.button {
      padding: 0.75rem 1.5rem;
      background-color: #ffffff;
      color: #0f0f0f;
      text-decoration: none;
      border-radius: 999px;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }

    a.button:hover {
      background-color: #dcdcdc;
    }
  </style>
</head>
<body>
  <img src="radiology%20mushroom.png" alt="Glowing stylized mushroom radiograph with swirling roots and a heart at the base" />

  <h1>The Mushroom Radiograph</h1>

  <p>
    Not all that glows is pathology.<br />
    This is not a diagnosis. This is a doorway.<br />
    A radiograph can be precise. It can also be poetic.
  </p>

  <a class="button" href="https://learndoteach.org">Enter the Circle</a>
</body>
</html>
